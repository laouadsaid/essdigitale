<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESSDGITALE</title>

<style>
body{
font-family: Arial;
direction: rtl;
margin:0;
background:#f5f7fb;
}

header{
background:#0a3d62;
color:white;
padding:30px;
text-align:center;
}

section{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin:15px 0;
border-radius:12px;
box-shadow:0 0 10px #ddd;
}

input, textarea{
width:100%;
padding:10px;
margin:8px 0;
box-sizing:border-box;
}

button{
background:#27ae60;
color:white;
padding:12px;
border:none;
cursor:pointer;
width:100%;
border-radius:8px;
font-size:16px;
}

.result{
background:#eee;
padding:10px;
margin-top:10px;
border-radius:8px;
}
</style>

</head>

<body>

<header>
<h1>ESSDGITALE</h1>
<p>منصة دعم المشاريع ودراسة الجدوى</p>
</header>

<section>

<!-- خدمات -->
<div class="card">
<h2>🛠️ خدماتنا</h2>
<p>مواكبة المشاريع - دراسة الجدوى - تحليل الأفكار</p>
</div>

<!-- حاسبة -->
<div class="card">
<h2>📊 حاسبة الأرباح</h2>

<input id="price" placeholder="سعر المنتج">
<input id="sales" placeholder="عدد المبيعات">
<input id="cost" placeholder="التكاليف الشهرية">

<button onclick="calc()">احسب</button>

<div class="result" id="result"></div>
</div>

<!-- AI -->
<div class="card">
<h2>🤖 تحليل فكرة المشروع</h2>

<textarea id="idea" placeholder="اكتب فكرتك"></textarea>

<button onclick="ai()">تحليل</button>

<div class="result" id="aiResult"></div>
</div>

</section>

<script>

// حساب الأرباح (مُصحح)
function calc(){

let price = parseFloat(document.getElementById("price").value) || 0;
let sales = parseFloat(document.getElementById("sales").value) || 0;
let cost = parseFloat(document.getElementById("cost").value) || 0;

let revenue = price * sales;
let profit = revenue - cost;
let roi = cost ? (profit / cost) * 100 : 0;

document.getElementById("result").innerHTML =
"💰 الربح: " + profit.toFixed(2) + "<br>" +
"📈 الإيرادات: " + revenue.toFixed(2) + "<br>" +
"📊 ROI: " + roi.toFixed(1) + "%";
}

// تحليل بسيط
function ai(){

let idea = document.getElementById("idea").value;

if(!idea){
document.getElementById("aiResult").innerHTML = "اكتب فكرة المشروع أولاً";
return;
}

document.getElementById("aiResult").innerHTML =
"🔍 تحليل أولي:<br>" +
"- دراسة السوق ضرورية<br>" +
"- ابدأ صغيراً (MVP)<br>" +
"- اختبر الفكرة قبل الاستثمار الكبير<br>" +
"- يمكن أن يكون مشروع ناجح إذا تم تنفيذه جيداً";
}

</script>

</body>
</html>
